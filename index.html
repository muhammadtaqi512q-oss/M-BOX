
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE GROUP OF COMPANY | Triple Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&family=Orbitron:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-shine: linear-gradient(135deg, #bf953f 0%, #fcf6ba 45%, #b38728 70%, #fbf5b7 85%, #aa771c 100%);
            --lyra-blue: #00d2ff;
            --lyra-bg: #1a2238;
        }

        body {
            margin: 0;
            padding: 0;
            background: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: serif;
            transition: all 0.5s ease;
        }

        /* TOGGLE BUTTON */
        .circle-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 70px;
            height: 70px;
            background: red;
            color: white;
            border-radius: 50%;
            border: 2px solid gold;
            box-shadow: 0 0 15px gold;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            cursor: pointer;
            z-index: 9999;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: bold;
            text-align: center;
            line-height: 1.2;
        }

        /* CLASSIC DESIGN */
        .gold-box {
            background: linear-gradient(180deg, #d6a94b, #8a6025);
            border: 6px solid #e6c26b;
            padding: 40px 60px;
            border-radius: 12px;
            box-shadow: 0 0 20px gold, inset 0 0 15px #5e3c15;
            text-align: center;
            margin-bottom: 30px;
            transition: 0.5s;
        }

        .gold-text {
            font-size: 50px;
            font-weight: bold;
            color: #ffdd77;
            text-shadow: 0px 2px 2px #a67c00, 0px 4px 4px #8a6b00, 0px 6px 6px black;
            letter-spacing: 2px;
        }

        .btn {
            display: block;
            margin: 15px auto;
            width: 280px;
            padding: 15px;
            border: 2px solid red;
            color: red;
            background: transparent;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
            font-family: serif;
            text-decoration: none;
            text-align: center;
        }

        /* NOVA DESIGN */
        body.nova-active { background: radial-gradient(circle, #111 0%, #000 100%); }
        .nova-active .circle-btn { background: var(--gold-shine); color: black; border-color: white; box-shadow: 0 0 20px white; }
        .nova-active .gold-box { background: #0d0d0d; border: 1px solid rgba(212,175,55,0.3); border-radius: 40px; box-shadow: 0 0 40px rgba(212,175,55,0.1); }
        .nova-active .gold-text { font-family: 'Cinzel', serif; background: var(--gold-shine); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: none; }
        .nova-active .btn { background: var(--gold-shine); border: none; color: black; font-weight: 700; border-radius: 15px; font-family: 'Poppins'; text-transform: uppercase; }

        /* LYRA DESIGN (Inspired by Image) */
        body.lyra-active { background: #0f172a; font-family: 'Orbitron', sans-serif; }
        .lyra-active .circle-btn { background: var(--lyra-blue); color: #0f172a; border: 2px solid #fff; box-shadow: 0 0 20px var(--lyra-blue); }
        
        .lyra-active .gold-box { 
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--lyra-blue);
            border-radius: 0px;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); /* Sleek slanted look */
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
        }

        .lyra-active .gold-text { 
            color: white; 
            text-shadow: 0 0 10px var(--lyra-blue), 0 0 20px var(--lyra-blue);
            font-family: 'Orbitron', sans-serif;
            background: none;
            -webkit-text-fill-color: white;
            font-size: 40px;
        }

        .lyra-active .decor { color: var(--lyra-blue); }

        .lyra-active .btn {
            border: 1px solid var(--lyra-blue);
            color: white;
            background: rgba(0, 210, 255, 0.1);
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0, 210, 255, 0.2);
        }

        .lyra-active .btn:hover {
            background: var(--lyra-blue);
            color: #0f172a;
            box-shadow: 0 0 30px var(--lyra-blue);
        }

        /* Shine Animation for Nova */
        .nova-active .btn::after {
            content: ''; position: absolute; top: -50%; left: -100%; width: 100%; height: 200%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.5), transparent);
            transform: rotate(30deg); animation: moveShine 3s infinite;
        }
        @keyframes moveShine { 0% { left: -100%; } 20% { left: 150%; } 100% { left: 150%; } }

    </style>
</head>
<body id="mainBody">

    <div class="circle-btn" onclick="cycleModes()">
        <span id="btnText">NOVA<br>MODE</span>
    </div>

    <div class="gold-box">
        <div class="decor" id="decorTop">★ ✦ ✧ ✦ ★</div>
        <div class="gold-text">CORE GROUP OF COMPANY</div>
        <div class="decor" id="decorBottom">★ ✦ ✧ ✦ ★</div>
    </div>

    <a href="https://www3.oneapp.dev/" target="_blank" class="btn">CORE WEB</a>
    <a href="https://sites.google.com/view/master-ai-mt-m/home" target="_blank" class="btn">CORE AI</a>
    <a href="https://sites.google.com/view/core-ai-developer/home" target="_blank" class="btn">CORE COURSES</a>

    <script>
        let currentMode = 0; // 0: Classic, 1: Nova, 2: Lyra
        const body = document.getElementById('mainBody');
        const btnText = document.getElementById('btnText');
        const decors = document.querySelectorAll('.decor');

        function cycleModes() {
            currentMode = (currentMode + 1) % 3;

            // Reset classes
            body.classList.remove('nova-active', 'lyra-active');

            if (currentMode === 0) {
                btnText.innerHTML = "NOVA<br>MODE";
                decors.forEach(d => d.style.display = "block");
            } 
            else if (currentMode === 1) {
                body.classList.add('nova-active');
                btnText.innerHTML = "LYRA<br>MODE";
                decors.forEach(d => d.style.display = "none");
            } 
            else if (currentMode === 2) {
                body.classList.add('lyra-active');
                btnText.innerHTML = "CLASSIC<br>MODE";
                decors.forEach(d => d.style.display = "block");
                decors.forEach(d => d.innerHTML = "— CYBER —");
            }
        }
    </script>

</body>
</html>
